<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rechnung – Cleancare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a2b3c;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      max-width: 820px;
      margin: 0 auto 28px;
      background: #1a3a5c;
      color: white;
      border-radius: 10px;
      padding: 20px 28px;
    }
    header h1 { font-size: 1.35rem; font-weight: 700; }
    header p  { font-size: 0.82rem; opacity: 0.7; margin-top: 4px; }

    form {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 1px 5px rgba(0,0,0,.07);
    }
    .card h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #1a3a5c;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e2eaf2;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 80px 1fr; gap: 14px; }
    @media (max-width: 580px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0.81rem;
      font-weight: 600;
      color: #445566;
    }
    .req { color: #c0392b; }

    input, textarea, select {
      border: 1.5px solid #d0dce8;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.92rem;
      font-family: inherit;
      background: #fafcff;
      width: 100%;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #1a3a5c;
      background: #fff;
    }
    textarea { resize: vertical; min-height: 86px; }

    /* ── Positionstabelle ─────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th {
      background: #1a3a5c;
      color: #fff;
      padding: 9px 8px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
    }
    tbody tr:nth-child(even) { background: #f4f8fc; }
    tbody td { padding: 5px 5px; vertical-align: middle; }
    tbody td input { background: transparent; border: 1.5px solid #d0dce8; }
    tbody td input:focus { background: #fff; }
    .td-r  { text-align: right; }
    .td-calc { text-align: right; font-weight: 600; color: #1a3a5c;
               padding-right: 8px; white-space: nowrap; }
    .btn-del {
      background: none; border: none; cursor: pointer;
      color: #c0392b; font-size: 1.05rem; padding: 2px 7px;
      border-radius: 4px;
    }
    .btn-del:hover { background: #fdecea; }

    .btn-add {
      margin-top: 12px;
      background: none;
      border: 1.5px dashed #1a3a5c;
      color: #1a3a5c;
      border-radius: 6px;
      padding: 7px 16px;
      font-size: 0.83rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .15s;
    }
    .btn-add:hover { background: #e8f0f8; }

    /* ── Summen ───────────────────────────────────────────── */
    .summen {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 5px;
      margin-top: 16px; font-size: 0.9rem;
    }
    .sumrow { display: flex; gap: 20px; }
    .slbl  { color: #445566; }
    .sval  { font-weight: 700; min-width: 110px; text-align: right; }
    .sdiv  { width: 240px; border-top: 2px solid #1a3a5c; margin: 3px 0; }
    .stot .slbl, .stot .sval { font-size: 1.05rem; color: #1a3a5c; }

    /* ── Submit ───────────────────────────────────────────── */
    .btn-submit {
      background: #1a3a5c; color: white;
      border: none; border-radius: 8px;
      padding: 14px 28px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      align-self: flex-end;
      transition: background .15s;
    }
    .btn-submit:hover { background: #0e2340; }
    .btn-submit svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<header>
  <h1>Cleancare Systemreinigung UG</h1>
  <p>Rechnung erstellen &amp; als PDF herunterladen</p>
</header>

<form action="/pdf" method="POST">

  <!-- Rechnungsdaten -->
  <div class="card">
    <h2>Rechnungsdaten</h2>
    <div class="grid-3">
      <label>
        <span>Rechnungsnummer <span class="req">*</span></span>
        <input type="text" name="rechnungsnr" required placeholder="z. B. 18020" />
      </label>
      <label>
        <span>Rechnungsdatum <span class="req">*</span></span>
        <input type="date" name="datum" id="datum" required />
      </label>
      <label>
        <span>Kundennummer</span>
        <input type="text" name="kundennr" placeholder="z. B. 15113" />
      </label>
    </div>
  </div>

  <!-- Kunde -->
  <div class="card">
    <h2>Kunde</h2>
    <label>
      <span>Name &amp; Adresse des Kunden <span class="req">*</span></span>
      <textarea name="kunde" required
        placeholder="Mustermann GmbH&#10;Musterstraße 1&#10;12345 Musterstadt"></textarea>
    </label>
  </div>

  <!-- Einsatzort -->
  <div class="card">
    <h2>Einsatzort</h2>
    <div class="grid-2" style="margin-bottom:12px">
      <label>Bezeichnung / Name
        <input type="text" name="einsatzort_name" placeholder="z. B. Tankstelle Nord" />
      </label>
      <label>Straße &amp; Hausnummer
        <input type="text" name="einsatzort_strasse" placeholder="z. B. Hauptstraße 42" />
      </label>
    </div>
    <div class="grid-4">
      <label style="grid-column:1">PLZ
        <input type="text" name="einsatzort_plz" placeholder="37079" maxlength="10" />
      </label>
      <label style="grid-column:2/5">Ort
        <input type="text" name="einsatzort_ort" placeholder="Göttingen" />
      </label>
    </div>
  </div>

  <!-- Positionen -->
  <div class="card">
    <h2>Positionen / Leistungen</h2>
    <div class="tbl-wrap">
      <table id="pos-table">
        <thead>
          <tr>
            <th style="width:50%">Leistung</th>
            <th style="width:10%">Anzahl</th>
            <th style="width:17%">Einzelpreis (€)</th>
            <th style="width:15%">Gesamt</th>
            <th style="width:8%"></th>
          </tr>
        </thead>
        <tbody id="pos-body"></tbody>
      </table>
    </div>
    <button type="button" class="btn-add" onclick="addRow()">
      ＋ Zeile hinzufügen
    </button>

    <div class="summen">
      <div class="sumrow">
        <span class="slbl">Netto:</span>
        <span class="sval" id="s-netto">0,00 €</span>
      </div>
      <div class="sumrow">
        <span class="slbl" id="s-mwst-lbl">MwSt. 19 %:</span>
        <span class="sval" id="s-mwst">0,00 €</span>
      </div>
      <div class="sdiv"></div>
      <div class="sumrow stot">
        <span class="slbl">Gesamt:</span>
        <span class="sval" id="s-ges">0,00 €</span>
      </div>
    </div>
  </div>

  <!-- Steuer -->
  <div class="card">
    <h2>Steuer</h2>
    <label style="max-width:240px">MwSt.-Satz
      <select name="mwst" id="mwst-sel" onchange="recalc()">
        <option value="19" selected>19 % (Regelbesteuerung)</option>
        <option value="0">0 % (Kleinunternehmer)</option>
      </select>
    </label>
  </div>

  <button type="submit" class="btn-submit">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    PDF erstellen &amp; herunterladen
  </button>

</form>

<script>
  document.getElementById("datum").valueAsDate = new Date();

  let rowId = 0;

  const fmt = n =>
    n.toLocaleString("de-DE", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";

  function addRow(leistung = "", anzahl = 1, preis = "") {
    const id = rowId++;
    const tr = document.createElement("tr");
    tr.id = "row-" + id;
    tr.innerHTML = `
      <td><input type="text"   name="leistung[]"   value="${leistung}"
                 placeholder="Leistungsbeschreibung" /></td>
      <td><input type="number" name="anzahl[]"      value="${anzahl}"
                 min="0" step="any" style="width:68px" oninput="recalc()" /></td>
      <td><input type="number" name="einzelpreis[]" value="${preis}"
                 min="0" step="0.01" placeholder="0,00" oninput="recalc()" /></td>
      <td class="td-calc" id="calc-${id}">0,00 €</td>
      <td class="td-r">
        <button type="button" class="btn-del"
                onclick="removeRow('row-${id}')" title="Löschen">✕</button>
      </td>`;
    document.getElementById("pos-body").appendChild(tr);
    recalc();
  }

  function removeRow(id) {
    document.getElementById(id)?.remove();
    recalc();
  }

  function recalc() {
    let netto = 0;
    document.querySelectorAll("#pos-body tr").forEach(tr => {
      const a = parseFloat(tr.querySelector('[name="anzahl[]"]').value)      || 0;
      const p = parseFloat(tr.querySelector('[name="einzelpreis[]"]').value) || 0;
      const g = a * p;
      netto += g;
      const cid = tr.id.replace("row-", "calc-");
      const cel = document.getElementById(cid);
      if (cel) cel.textContent = fmt(g);
    });
    const satz   = parseFloat(document.getElementById("mwst-sel").value) || 0;
    const mwst   = netto * satz / 100;
    const gesamt = netto + mwst;
    document.getElementById("s-netto").textContent    = fmt(netto);
    document.getElementById("s-mwst").textContent     = fmt(mwst);
    document.getElementById("s-ges").textContent      = fmt(gesamt);
    document.getElementById("s-mwst-lbl").textContent = `MwSt. ${satz} %:`;
  }

  // Zwei Startzeilen
  addRow("", 1, "");
  addRow("Anfahrtspauschale AP", 1, "");
</script>

</body>
</html>
