name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          pip install flask reportlab pypdf pillow pywebview pyinstaller

      - name: EXE bauen
        run: |
          pyinstaller --onefile --windowed `
            --name "Cleancare-Rechnung" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            main.py

      - name: EXE als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: Cleancare-Rechnung-Windows
          path: dist/Cleancare-Rechnung.exe
          retention-days: 90
